#
# Scope rule (ticket #17): evidentiary narrative chapters only.
# Vol 3 Ch 17 "Findings" and Ch 18 "Recommendations" are the Commissioner's
# conclusions and are excluded, as are Vols 1, 4, and 5 entirely.

